name: Build Telegram iOS

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: false
    
    - name: Fix submodule URLs
      run: |
        git config --file .gitmodules submodule.submodules/rlottie/rlottie.url https://github.com/TelegramMessenger/rlottie.git
        git config --file .gitmodules submodule.submodules/TgVoipWebrtc/tgcalls.url https://github.com/TelegramMessenger/tgcalls.git
        git submodule sync
        
    - name: Initialize submodules
      run: |
        git submodule update --init --recursive --depth 1
    
    - name: Setup Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: latest-stable
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python3 --version
        xcodebuild -version
        which bazel || echo "Bazel not found, will be downloaded by Make.py"
        
    - name: Generate random identifier
      id: gen_id
      run: |
        RANDOM_ID=$(openssl rand -hex 8)
        echo "random_id=$RANDOM_ID" >> $GITHUB_OUTPUT
        echo "Generated ID: $RANDOM_ID"
    
    - name: Create configuration
      run: |
        cat > build-system/build_configuration.json << EOF
        {
          "bundle_id": "org.${{ steps.gen_id.outputs.random_id }}.Telegram",
          "api_id": "${{ secrets.TELEGRAM_API_ID }}",
          "api_hash": "${{ secrets.TELEGRAM_API_HASH }}",
          "team_id": "${{ secrets.APPLE_TEAM_ID }}",
          "app_center_id": "0",
          "is_internal_build": "true",
          "is_appstore_build": "false",
          "appstore_id": "0",
          "app_specific_url_scheme": "tg",
          "premium_iap_product_id": "",
          "enable_siri": false,
          "enable_icloud": false
        }
        EOF
        
    - name: Generate Xcode project
      run: |
        python3 build-system/Make/Make.py \
          --overrideXcodeVersion \
          --cacheDir="${HOME}/telegram-bazel-cache" \
          generateProject \
          --configurationPath=build-system/build_configuration.json \
          --xcodeManagedCodesigning \
          --disableProvisioningProfiles
    
    - name: Build for simulator
      run: |
        python3 build-system/Make/Make.py \
          --overrideXcodeVersion \
          --cacheDir="${HOME}/telegram-bazel-cache" \
          build \
          --configurationPath=build-system/build_configuration.json \
          --xcodeManagedCodesigning \
          --disableProvisioningProfiles \
          --buildNumber=100001 \
          --configuration=debug_arm64
      continue-on-error: true
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: telegram-ios-build
        path: |
          build-output/
          *.ipa
        retention-days: 7

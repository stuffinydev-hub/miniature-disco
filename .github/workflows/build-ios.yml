name: Build Telegram iOS

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 120
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 1
    
    - name: Select Xcode
      run: |
        sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer || \
        sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
        xcodebuild -version
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Verify tools
      run: |
        echo "Python: $(python3 --version)"
        echo "Xcode: $(xcodebuild -version)"
        echo "Git submodules status:"
        git submodule status | head -5
        
    - name: Generate random identifier
      id: gen_id
      run: |
        RANDOM_ID=$(openssl rand -hex 8)
        echo "random_id=$RANDOM_ID" >> $GITHUB_OUTPUT
        echo "Generated bundle ID: org.$RANDOM_ID.Telegram"
    
    - name: Create configuration file
      run: |
        cat > build-system/build_configuration.json << 'EOF'
        {
          "bundle_id": "org.${{ steps.gen_id.outputs.random_id }}.Telegram",
          "api_id": "${{ secrets.TELEGRAM_API_ID || '0' }}",
          "api_hash": "${{ secrets.TELEGRAM_API_HASH || 'placeholder' }}",
          "team_id": "${{ secrets.APPLE_TEAM_ID || 'PLACEHOLDER' }}",
          "app_center_id": "0",
          "is_internal_build": "true",
          "is_appstore_build": "false",
          "appstore_id": "0",
          "app_specific_url_scheme": "tg",
          "premium_iap_product_id": "",
          "enable_siri": false,
          "enable_icloud": false
        }
        EOF
        echo "Configuration file created"
        echo "Bundle ID: org.${{ steps.gen_id.outputs.random_id }}.Telegram"
        echo "API ID configured: ${{ secrets.TELEGRAM_API_ID != '' }}"
        
    - name: Validate configuration
      run: |
        if [ ! -f build-system/build_configuration.json ]; then
          echo "❌ Configuration file not created"
          exit 1
        fi
        echo "✓ Configuration file exists"
        cat build-system/build_configuration.json
        
    - name: Generate Xcode project
      run: |
        echo "Starting Xcode project generation..."
        python3 build-system/Make/Make.py \
          --overrideXcodeVersion \
          --cacheDir="${HOME}/telegram-bazel-cache" \
          generateProject \
          --configurationPath=build-system/build_configuration.json \
          --xcodeManagedCodesigning \
          --disableProvisioningProfiles \
          --bazelArgs='--noenable_bzlmod' || {
            echo "❌ Xcode project generation failed"
            exit 1
          }
        echo "✓ Xcode project generated successfully"
      timeout-minutes: 60
    
    - name: Build for simulator
      run: |
        echo "Starting iOS simulator build..."
        python3 build-system/Make/Make.py \
          --overrideXcodeVersion \
          --cacheDir="${HOME}/telegram-bazel-cache" \
          build \
          --configurationPath=build-system/build_configuration.json \
          --xcodeManagedCodesigning \
          --disableProvisioningProfiles \
          --buildNumber=100001 \
          --configuration=debug_arm64 \
          --bazelArgs='--noenable_bzlmod' || {
            echo "⚠ iOS build failed, but continuing for artifact check..."
          }
        echo "Build step completed"
      timeout-minutes: 90
    
    - name: Check build output
      if: always()
      run: |
        echo "=== Checking for build artifacts ==="
        echo ""
        echo "Build output directory:"
        if [ -d build-output ]; then
          echo "✓ build-output exists"
          ls -lah build-output/
        else
          echo "✗ build-output directory not found"
        fi
        
        echo ""
        echo "Searching for .ipa files:"
        find . -name "*.ipa" -type f 2>/dev/null | head -10 || echo "No IPA files found"
        
        echo ""
        echo "Searching for .app directories:"
        find . -name "*.app" -type d 2>/dev/null | head -10 || echo "No APP directories found"
        
        echo ""
        echo "Bazel cache status:"
        ls -lah "${HOME}/telegram-bazel-cache" 2>/dev/null || echo "Cache directory not found"
    
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: telegram-ios-build-${{ github.run_number }}
        path: |
          build-output/**/*
          *.ipa
          *.app
        if-no-files-found: warn
        retention-days: 7

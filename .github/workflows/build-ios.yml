name: Build Telegram iOS

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 120
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: false
        fetch-depth: 1
    
    - name: Fix submodule URLs
      run: |
        git config --file .gitmodules submodule.submodules/rlottie/rlottie.url https://github.com/TelegramMessenger/rlottie.git
        git config --file .gitmodules submodule.submodules/TgVoipWebrtc/tgcalls.url https://github.com/TelegramMessenger/tgcalls.git
        git submodule sync
        
    - name: Initialize submodules
      run: |
        git submodule update --init --recursive --depth 1
    
    - name: Select Xcode
      run: |
        sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer || \
        sudo xcode-select -s /Applications/Xcode_15.3.app/Contents/Developer || \
        sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
        xcodebuild -version
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install Bazelisk
      run: |
        brew install bazelisk
        echo "BAZEL_PATH=$(which bazelisk)" >> $GITHUB_ENV
        
    - name: Verify tools
      run: |
        echo "Python: $(python3 --version)"
        echo "Xcode: $(xcodebuild -version)"
        echo "Bazel: $BAZEL_PATH"
        $BAZEL_PATH version || echo "Bazel will be downloaded on first use"
        
    - name: Generate random identifier
      id: gen_id
      run: |
        RANDOM_ID=$(openssl rand -hex 8)
        echo "random_id=$RANDOM_ID" >> $GITHUB_OUTPUT
        echo "Generated ID: $RANDOM_ID"
    
    - name: Create configuration file
      run: |
        cat > build-system/build_configuration.json << 'EOF'
        {
          "bundle_id": "org.${{ steps.gen_id.outputs.random_id }}.Telegram",
          "api_id": "${{ secrets.TELEGRAM_API_ID }}",
          "api_hash": "${{ secrets.TELEGRAM_API_HASH }}",
          "team_id": "${{ secrets.APPLE_TEAM_ID }}",
          "app_center_id": "0",
          "is_internal_build": "true",
          "is_appstore_build": "false",
          "appstore_id": "0",
          "app_specific_url_scheme": "tg",
          "premium_iap_product_id": "",
          "enable_siri": false,
          "enable_icloud": false
        }
        EOF
        echo "Configuration created:"
        cat build-system/build_configuration.json
        
    - name: Generate Xcode project
      run: |
        python3 build-system/Make/Make.py \
          --overrideXcodeVersion \
          --overrideBazelVersion \
          --bazel="$BAZEL_PATH" \
          --cacheDir="${HOME}/telegram-bazel-cache" \
          generateProject \
          --configurationPath=build-system/build_configuration.json \
          --xcodeManagedCodesigning \
          --disableProvisioningProfiles
      timeout-minutes: 60
    
    - name: Build for simulator
      run: |
        python3 build-system/Make/Make.py \
          --overrideXcodeVersion \
          --overrideBazelVersion \
          --bazel="$BAZEL_PATH" \
          --cacheDir="${HOME}/telegram-bazel-cache" \
          build \
          --configurationPath=build-system/build_configuration.json \
          --xcodeManagedCodesigning \
          --disableProvisioningProfiles \
          --buildNumber=100001 \
          --configuration=debug_arm64
      timeout-minutes: 90
      continue-on-error: true
    
    - name: Check build output
      if: always()
      run: |
        echo "Checking for build artifacts..."
        ls -la build-output/ || echo "No build-output directory"
        find . -name "*.ipa" -o -name "*.app" || echo "No IPA or APP files found"
    
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: telegram-ios-build-${{ github.run_number }}
        path: |
          build-output/**/*
          *.ipa
          *.app
        if-no-files-found: warn
        retention-days: 7
    
    - name: Upload logs on failure
      uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: build-logs-${{ github.run_number }}
        path: |
          **/*.log
          build-system/**/*.log
        if-no-files-found: ignore
        retention-days: 3

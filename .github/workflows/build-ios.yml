name: Build Telegram iOS

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 360  # 6 часов для всего job
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 1
    
    - name: Select Xcode
      run: |
        sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer || \
        sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
        xcodebuild -version
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    # КРИТИЧНО: Кэширование Bazel для ускорения повторных сборок
    - name: Cache Bazel
      uses: actions/cache@v4
      with:
        path: |
          ~/telegram-bazel-cache
          ~/.cache/bazel
        key: bazel-${{ runner.os }}-${{ hashFiles('**/*.bzl', '**/*.bazel', 'WORKSPACE', 'MODULE.bazel', '.bazelversion') }}
        restore-keys: |
          bazel-${{ runner.os }}-
    
    - name: System diagnostics
      run: |
        echo "=== System Information ==="
        echo "Python: $(python3 --version)"
        echo "Xcode: $(xcodebuild -version)"
        echo ""
        echo "=== Memory Status ==="
        vm_stat | perl -ne '/page size of (\d+)/ and $size=$1; /Pages\s+([^:]+)[^\d]+(\d+)/ and printf("%-20s % 12.2f MB\n", "$1:", $2 * $size / 1048576);'
        echo ""
        echo "=== Disk Space ==="
        df -h /
        echo ""
        echo "=== CPU Info ==="
        sysctl -n machdep.cpu.brand_string
        sysctl -n hw.ncpu
        
    - name: Generate random identifier
      id: gen_id
      run: |
        RANDOM_ID=$(openssl rand -hex 8)
        echo "random_id=$RANDOM_ID" >> $GITHUB_OUTPUT
        echo "Generated bundle ID: org.$RANDOM_ID.Telegram"
    
    - name: Create configuration file
      run: |
        cat > build-system/build_configuration.json << 'EOF'
        {
          "bundle_id": "org.${{ steps.gen_id.outputs.random_id }}.Telegram",
          "api_id": "${{ secrets.TELEGRAM_API_ID }}",
          "api_hash": "${{ secrets.TELEGRAM_API_HASH }}",
          "team_id": "${{ secrets.APPLE_TEAM_ID }}",
          "app_center_id": "0",
          "is_internal_build": "true",
          "is_appstore_build": "false",
          "appstore_id": "0",
          "app_specific_url_scheme": "tg",
          "premium_iap_product_id": "",
          "enable_siri": false,
          "enable_icloud": false
        }
        EOF
        echo "✓ Configuration file created"
    
    # Оптимизация Bazel для GitHub Actions
    - name: Configure Bazel for CI
      run: |
        cat >> .bazelrc << 'EOF'
        
        # === GitHub Actions Optimizations ===
        # Ограничение параллелизма для предотвращения OOM
        build:ci --jobs=4
        build:ci --local_ram_resources=12288
        build:ci --local_cpu_resources=4
        
        # Уменьшение использования памяти
        build:ci --discard_analysis_cache
        build:ci --notrack_incremental_state
        build:ci --nokeep_state_after_build
        
        # Worker optimization
        build:ci --experimental_worker_max_multiplex_instances=4
        build:ci --experimental_worker_memory_limit_mb=2048
        
        # Progress reporting
        build:ci --show_progress_rate_limit=30
        build:ci --verbose_failures
        build:ci --announce_rc
        
        # Disk cache
        build:ci --disk_cache=~/telegram-bazel-cache
        
        EOF
        echo "✓ Bazel CI configuration added"
        echo ""
        echo "=== Current .bazelrc (last 20 lines) ==="
        tail -20 .bazelrc
        
    - name: Generate Xcode project
      run: |
        echo "========================================="
        echo "Starting Xcode project generation"
        echo "This may take 60-120 minutes on first run"
        echo "========================================="
        echo ""
        
        # Мониторинг памяти в фоне
        (while true; do
          TIMESTAMP=$(date +"%H:%M:%S")
          echo "[$TIMESTAMP] Memory status:"
          vm_stat | perl -ne '/page size of (\d+)/ and $size=$1; /Pages\s+([^:]+)[^\d]+(\d+)/ and printf("  %-20s % 12.2f MB\n", "$1:", $2 * $size / 1048576);'
          echo ""
          sleep 300  # каждые 5 минут
        done) &
        MONITOR_PID=$!
        
        # Запуск генерации с CI конфигурацией
        set +e
        python3 build-system/Make/Make.py \
          --overrideXcodeVersion \
          --bazelArguments='--config=ci' \
          --cacheDir="${HOME}/telegram-bazel-cache" \
          generateProject \
          --configurationPath=build-system/build_configuration.json \
          --xcodeManagedCodesigning \
          --disableProvisioningProfiles
        
        EXIT_CODE=$?
        kill $MONITOR_PID 2>/dev/null || true
        
        echo ""
        echo "========================================="
        if [ $EXIT_CODE -eq 0 ]; then
          echo "✓ Project generation completed successfully!"
        else
          echo "✗ Project generation failed with exit code $EXIT_CODE"
          echo "========================================="
          echo ""
          
          # Диагностика ошибки
          echo "=== Checking Bazel logs ==="
          if [ -d ~/.cache/bazel ]; then
            find ~/.cache/bazel -name "command.log" -exec tail -100 {} \; 2>/dev/null || true
          fi
          
          echo ""
          echo "=== Final memory status ==="
          vm_stat | perl -ne '/page size of (\d+)/ and $size=$1; /Pages\s+([^:]+)[^\d]+(\d+)/ and printf("%-20s % 12.2f MB\n", "$1:", $2 * $size / 1048576);'
          
          exit $EXIT_CODE
        fi
        echo "========================================="
      timeout-minutes: 150  # 2.5 часа для генерации
      continue-on-error: false
    
    - name: Verify generated project
      if: success()
      run: |
        echo "=== Verifying Xcode project ==="
        if [ -d "Telegram.xcodeproj" ]; then
          echo "✓ Telegram.xcodeproj exists"
          ls -lh Telegram.xcodeproj/ | head -20
          echo ""
          echo "Project size:"
          du -sh Telegram.xcodeproj
        else
          echo "✗ Telegram.xcodeproj not found!"
          echo "Searching for xcodeproj files:"
          find . -name "*.xcodeproj" -type d 2>/dev/null || echo "No xcodeproj found"
          exit 1
        fi
    
    - name: Build for simulator (optional)
      if: success()
      run: |
        echo "========================================="
        echo "Starting iOS simulator build"
        echo "========================================="
        
        python3 build-system/Make/Make.py \
          --overrideXcodeVersion \
          --bazelArguments='--config=ci' \
          --cacheDir="${HOME}/telegram-bazel-cache" \
          build \
          --configurationPath=build-system/build_configuration.json \
          --xcodeManagedCodesigning \
          --disableProvisioningProfiles \
          --buildNumber=100001 \
          --configuration=debug_arm64 || {
            echo "⚠ Build failed, but continuing..."
          }
      timeout-minutes: 120
      continue-on-error: true
    
    - name: Collect build artifacts
      if: always()
      run: |
        echo "=== Searching for build artifacts ==="
        echo ""
        
        echo "1. Checking build-output directory:"
        if [ -d "build-output" ]; then
          echo "✓ build-output exists"
          ls -lah build-output/ || true
        else
          echo "✗ build-output not found"
        fi
        
        echo ""
        echo "2. Searching for .app bundles:"
        find . -name "*.app" -type d 2>/dev/null | grep -v "node_modules" | head -10 || echo "No .app found"
        
        echo ""
        echo "3. Searching for .ipa files:"
        find . -name "*.ipa" 2>/dev/null | head -10 || echo "No .ipa found"
        
        echo ""
        echo "4. Bazel cache size:"
        du -sh ~/telegram-bazel-cache 2>/dev/null || echo "No cache"
        
        echo ""
        echo "5. Disk usage:"
        df -h /
    
    - name: Upload Xcode project
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: telegram-xcodeproj-${{ github.run_number }}
        path: Telegram.xcodeproj/**/*
        retention-days: 7
        compression-level: 6
    
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: telegram-build-${{ github.run_number }}
        path: |
          build-output/**/*
          *.ipa
          *.app
        if-no-files-found: warn
        retention-days: 7
    
    - name: Upload Bazel logs on failure
      uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: bazel-logs-${{ github.run_number }}
        path: |
          ~/.cache/bazel/_bazel_runner/*/command.log
          ~/.cache/bazel/_bazel_runner/*/java.log*
        if-no-files-found: ignore
        retention-days: 3
